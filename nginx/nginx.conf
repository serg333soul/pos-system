# FILE: nginx/nginx.conf

server {
    listen 80;

    # 1. Рутинг для Фінансового мікросервісу
    location /finance/ {
        # Звертаємося до контейнера по його імені та внутрішньому порту
        proxy_pass http://pos_finance_api:8002/finance/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Рутинг для всього іншого (Продуктовий сервіс / Моноліт)
    location / {
        # Звертаємося до основного контейнера на його внутрішній порт 8000
        proxy_pass http://pos_product_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}