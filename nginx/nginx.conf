# FILE: nginx/nginx.conf

server {
    listen 80;
    server_name localhost;

    # Додаємо заголовки для правильної передачі IP-адрес та хостів до FastAPI
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 💰 ФІНАНСИ
    location /api/finance/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://finance_api:8002;
        # Перехоплюємо редиректи FastAPI (якщо забули слеш в кінці)
        proxy_redirect /finance/ /api/finance/;
    }

    # 👥 КЛІЄНТИ
    location /api/customers/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://customer_api:8003;
        proxy_redirect /customers/ /api/customers/;
    }

    # 🛒 КОШИК
    location /api/cart/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://order_service:8000;
        proxy_redirect /cart/ /api/cart/;
    }

    # 📦 СКЛАД (Всі його роути)
    location ~ ^/api/(inventory|ingredients|consumables|units|history|adjustments|suppliers|supplies) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_redirect / /api/;
    }

    # 🛍️ ВСЕ ІНШЕ (Fallback на product_service)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://product_service:8000;
        proxy_redirect / /api/;
    }
}