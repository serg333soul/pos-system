server {
    listen 80;
    server_name localhost;

    # 1. Головна сторінка (Фронтенд)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Для роботи Vue Router (щоб не було 404 при оновленні)
    }

    # 2. Проксі для КОШИКА (Order Service)
    # Запит /api/cart/... перетвориться на http://order_service:8000/cart/...
    location /api/cart {
        # Відрізаємо /api, залишаємо /cart
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://order_service:8000;
        proxy_set_header Host $host;
    }

    # 🔥 3. НОВИЙ Проксі для ФІНАНСІВ (Finance API)
    # Перенаправляє запити з /api/finance/... у новий мікросервіс
    location /api/finance/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://finance_api:8002;
        proxy_set_header Host $host;
    }

    # 🔥 НОВИЙ Проксі для КЛІЄНТІВ (Customer API)
    # Зверніть увагу: без слеша після customers
    location /api/customers {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://customer_api:8003;
        proxy_set_header Host $host;
    }

    # 🔥 НОВІ Проксі для СКЛАДУ (Inventory API)
    location /api/ingredients {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }
    
    location /api/consumables {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }
    
    location /api/units {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }

    location /api/history {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }

    location /api/suppliers {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }

    location /api/supplies {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://inventory_api:8004;
        proxy_set_header Host $host;
    }

    # 3. Проксі для ТОВАРІВ (Product Service) - все інше api
    # Запит /api/units/... перетвориться на http://product_service:8000/units/...
    location /api/ {
        # Відрізаємо /api
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://product_service:8000;
        proxy_set_header Host $host;
    }
}